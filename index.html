<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stranded Signal Studio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void:   #060608;
  --steel:  #323743;
  --silver: #595F6D;
  --white:  #F5F7FA;
  --yellow: #C99A0E;
  --border: rgba(201,154,14,0.12);
}
html, body { height: 100%; overflow: hidden; }
body { background: var(--void); color: var(--white); font-family: 'IBM Plex Mono', monospace; }

/* BG — hero image fills viewport */
.bg {
  position: fixed; inset: 0; z-index: 0;
}
.bg img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center center;
  opacity: 0.9;
  animation: zoom 30s ease-in-out infinite alternate;
}
@keyframes zoom { from { transform: scale(1); } to { transform: scale(1.04); } }
/* gradient so footer/nav are readable */
.bg::after {
  content: ''; position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(6,6,8,0.35) 0%, transparent 20%, transparent 65%, rgba(6,6,8,0.92) 100%),
    linear-gradient(to right, rgba(6,6,8,0.3) 0%, transparent 50%);
}

/* Corners */
.c { position: fixed; width: 24px; height: 24px; z-index: 10; }
.c::before, .c::after { content: ''; position: absolute; background: rgba(201,154,14,0.3); }
.ctL { top: 16px; left: 16px; }
.ctL::before { top:0; left:0; width:1px; height:14px; }
.ctL::after  { top:0; left:0; width:14px; height:1px; }
.cbR { bottom: 16px; right: 16px; }
.cbR::before { bottom:0; right:0; width:1px; height:14px; }
.cbR::after  { bottom:0; right:0; width:14px; height:1px; }

/* Layout */
.wrapper {
  position: relative; z-index: 2;
  height: 100vh;
  display: grid;
  grid-template-rows: 1fr auto;
}

/* MAIN — sits at bottom over image */
.main {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 56px 48px;
  gap: 28px;
}

/* Login button */
.login-wrap {
  opacity: 0; animation: fadeUp 0.9s ease 0.3s forwards;
}
.login-label {
  font-size: 9px; color: var(--silver);
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 10px;
}
.login-btn {
  display: inline-flex; align-items: center; gap: 14px;
  background: rgba(6,6,8,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  padding: 16px 28px;
  text-decoration: none; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  width: fit-content;
}
.login-btn:hover { border-color: rgba(201,154,14,0.4); background: rgba(15,17,21,0.88); }
.login-btn:hover .lb-text { color: var(--yellow); }
.lb-icon { opacity: 0.55; flex-shrink: 0; }
.lb-text {
  font-size: 11px; color: var(--white);
  letter-spacing: 0.18em; text-transform: uppercase;
  transition: color 0.2s;
}
.lb-arrow { font-size: 13px; color: var(--yellow); opacity: 0.6; margin-left: 4px; }

/* Contact row */
.contact-row {
  display: flex; align-items: center; gap: 20px;
  opacity: 0; animation: fadeUp 0.9s ease 0.55s forwards;
}
.cr { display: flex; flex-direction: column; gap: 2px; }
.cr-l { font-size: 8px; color: var(--silver); letter-spacing: 0.18em; text-transform: uppercase; }
.cr-v { font-size: 11px; color: rgba(245,247,250,0.75); letter-spacing: 0.04em; }
.cr-v a { color: inherit; text-decoration: none; }
.cr-v a:hover { color: var(--yellow); }
.cr-div { width: 1px; height: 22px; background: var(--steel); opacity: 0.35; }

/* FOOTER */
footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 56px 20px;
  border-top: 1px solid var(--border);
  opacity: 0; animation: fadeUp 0.9s ease 0.75s forwards;
}
.f-left { display: flex; align-items: center; gap: 4px; }
.ft { font-size: 9px; color: var(--steel); letter-spacing: 0.1em; text-transform: uppercase; }
.fs { font-size: 9px; color: var(--yellow); opacity: 0.22; padding: 0 4px; }
.f-right { font-size: 9px; color: var(--steel); letter-spacing: 0.1em; text-align: right; line-height: 1.9; }

@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

@media (max-width: 640px) {
  .main { padding: 0 24px 40px; }
  footer { padding-left: 24px; padding-right: 24px; }
  .f-left { display: none; }
}
</style>
</head>
<body>

<div class="bg"><img src="sss-hero-logo.png" alt="Stranded Signal Studio"></div>
<div class="c ctL"></div>
<div class="c cbR"></div>

<div class="wrapper">

  <div class="main">
    <div class="login-wrap">
      <div class="login-label">Secure Portal Access</div>
      <a class="login-btn" href="#">
        <svg class="lb-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1.5" y="6.5" width="13" height="8" rx="0.5" stroke="#C99A0E" stroke-width="1.2"/>
          <path d="M4.5 6.5V4.5a3.5 3.5 0 017 0v2" stroke="#C99A0E" stroke-width="1.2"/>
          <circle cx="8" cy="10.5" r="1" fill="#C99A0E"/>
        </svg>
        <span class="lb-text">Login to Signal Stack</span>
        <span class="lb-arrow">→</span>
      </a>
    </div>

    <div class="contact-row">
      <div class="cr">
        <span class="cr-l">Contact</span>
        <span class="cr-v"><a href="mailto:info@strandedsignal.com">info@strandedsignal.com</a></span>
      </div>
      <div class="cr-div"></div>
      <div class="cr">
        <span class="cr-l">Location</span>
        <span class="cr-v">New York, NY</span>
      </div>
    </div>
  </div>

  <footer>
    <div class="f-left">
      <span class="ft">Focus the Signal</span><span class="fs">//</span>
      <span class="ft">Compound Intelligence</span><span class="fs">//</span>
      <span class="ft">Deploy Capital</span><span class="fs">//</span>
      <span class="ft">Generate Asymmetric Returns</span>
    </div>
    <div class="f-right">
      © 2026 Stranded Signal Studio, LLC<br>
      Confidential — Not for Distribution
    </div>
  </footer>

</div>
</body>
</html>
